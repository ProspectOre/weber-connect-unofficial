name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Native integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          cache: pip
      - name: Install validation runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-runtime.txt
          python -m pip install \
            aioesphomeapi==45.3.1 \
            aiousbwatcher==1.1.2 \
            bandit==1.9.4 \
            homeassistant==2026.7.2 \
            mypy==1.19.1 \
            pip-audit==2.10.0 \
            pytest==9.0.3 \
            pytest-cov==7.1.0 \
            pytest-homeassistant-custom-component==0.13.346 \
            ruff==0.15.22 \
            serialx==1.8.2
      - name: Lint and type-check
        run: |
          ruff check custom_components tests_native scripts
          ruff format --check custom_components tests_native scripts
          mypy --python-version 3.14 --strict --ignore-missing-imports custom_components/weber_connect
          bandit -q -r custom_components/weber_connect scripts
      - name: Run native integration tests
        env:
          PYTHONASYNCIODEBUG: "1"
          PYTHONWARNINGS: error::RuntimeWarning
        run: >-
          pytest -q --asyncio-mode=auto tests_native
          --cov=custom_components/weber_connect
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=95
      - name: Validate release contract
        run: python scripts/validate_release.py
      - name: Audit runtime dependency
        run: >-
          pip-audit --requirement requirements-runtime.txt
          --no-deps --disable-pip
      - name: Lint workflows
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106
          "$GOBIN/actionlint"

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: home-assistant/actions/hassfest@e3fb68ebda13d88a0d695082f471ba2c83d025fb

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  ci:
    name: ci
    if: always()
    needs: [validate, hassfest, hacs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every release gate
        env:
          VALIDATE: ${{ needs.validate.result }}
          HASSFEST: ${{ needs.hassfest.result }}
          HACS: ${{ needs.hacs.result }}
        run: |
          echo "native integration: $VALIDATE"
          echo "hassfest: $HASSFEST"
          echo "hacs: $HACS"
          test "$VALIDATE" = success
          test "$HASSFEST" = success
          test "$HACS" = success
