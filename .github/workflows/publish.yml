name: Publish add-on images

on:
  push:
    branches:
      - main
    paths:
      - "weber_connect_ble/**"
  workflow_dispatch:

permissions:
  contents: read

# Never cancel an in-flight publish: a multi-arch push that is interrupted
# half-way can leave a partially-populated tag. Queue instead of cancelling.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-gate:
    name: Guard against overwriting a released version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read add-on version
        id: version
        run: echo "version=$(awk '/^version:/ {print $2; exit}' weber_connect_ble/config.yaml)" >> "$GITHUB_OUTPUT"

      - name: Fail if the version tag already exists in ghcr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "${VERSION:-}" ]]; then
            echo "::error::Could not read the add-on version from config.yaml"
            exit 1
          fi
          conflict=0
          for arch in amd64 aarch64; do
            repo="prospectore/${arch}-addon-weber_connect_ble"
            token="$(curl -fsSL -u "x:${GH_TOKEN}" \
              "https://ghcr.io/token?scope=repository:${repo}:pull&service=ghcr.io" \
              | python3 -c 'import sys, json; print(json.load(sys.stdin).get("token", ""))')"
            code="$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${repo}/manifests/${VERSION}")"
            echo "ghcr.io/${repo}:${VERSION} -> HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              echo "::error::ghcr.io/${repo}:${VERSION} already exists; refusing to overwrite a released tag. Bump the add-on version before publishing."
              conflict=1
            fi
          done
          [[ "${conflict}" == "0" ]]

  publish:
    name: Build and push (${{ matrix.arch }})
    needs: version-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_digest: sha256:995fc8a44059b3bac015603f63b56b1bf935c2227c5176823d9bb76b45fc2249
          - arch: aarch64
            platform: linux/arm64
            base_digest: sha256:5100b3a2e4741440e7bd587c124920fa3bf02287c4de3cb48aacef7049530ee1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: weber_connect_ble
          file: weber_connect_ble/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/prospectore/${{ matrix.arch }}-addon-weber_connect_ble:${{ needs.version-gate.outputs.version }}
            ghcr.io/prospectore/${{ matrix.arch }}-addon-weber_connect_ble:latest
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.version-gate.outputs.version }}
            BASE_DIGEST=${{ matrix.base_digest }}
          labels: |
            io.hass.version=${{ needs.version-gate.outputs.version }}
            io.hass.arch=${{ matrix.arch }}
            io.hass.type=app
            org.opencontainers.image.source=https://github.com/ProspectOre/weber-connect-home-assistant-addon
            org.opencontainers.image.licenses=MIT

      - name: Sign the pushed image with cosign (keyless)
        env:
          COSIGN_YES: "true"
          IMAGE: ghcr.io/prospectore/${{ matrix.arch }}-addon-weber_connect_ble
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
