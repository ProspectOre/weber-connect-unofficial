version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  # Runtime dependency lock for the add-on image (requirements.in/.txt).
  - package-ecosystem: "pip"
    directory: "/weber_connect_ble/app"
    schedule:
      interval: "monthly"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      runtime-python:
        patterns:
          - "*"

  # Development / CI dependency lock (requirements-dev.in/.txt).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      dev-python:
        patterns:
          - "*"

  # Home Assistant base image referenced by the add-on Dockerfile.
  - package-ecosystem: "docker"
    directory: "/weber_connect_ble"
    schedule:
      interval: "monthly"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      docker:
        patterns:
          - "*"
