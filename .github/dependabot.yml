version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  # Python development and test dependencies.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      dev-python:
        patterns:
          - "*"
