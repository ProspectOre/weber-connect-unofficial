name: Weber Connect for Home Assistant (Unofficial)
slug: weber_connect_ble
version: 2.0.1
stage: stable
image: ghcr.io/prospectore/{arch}-addon-weber_connect_ble
description: Unofficial BLE-first Weber Connect monitoring with phone and Home Assistant coexistence.
url: https://github.com/ProspectOre/weber-connect-home-assistant-addon/tree/main/weber_connect_ble
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
host_dbus: true
hassio_api: true
watchdog: http://[HOST]:[PORT:8099]/api/health
services:
  - mqtt:want
map:
  - data:rw
ingress: true
ingress_port: 8099
panel_icon: mdi:grill
options:
  log_level: info
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
schema:
  log_level: list(debug|info|warning|error)
  mqtt:
    host: str?
    port: port
    username: str?
    password: password?
